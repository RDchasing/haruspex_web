{% load static %}
<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{% block title %}Haruspex 在线解析{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'analysis/app.css' %}">
  <script src="{% static 'analysis/app.js' %}" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% url 'analysis:index' %}">
      <span class="brand-mark">H</span>
      <span>Haruspex Online</span>
    </a>
    <span class="topbar-note">二进制解析工作台</span>
  </header>
  <main class="shell">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
